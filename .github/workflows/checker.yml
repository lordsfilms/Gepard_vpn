name: Auto Key Checker

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-keys:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Download Xray
        run: |
          curl -L "https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip" -o xray.zip
          unzip -o xray.zip
          chmod +x xray

      - name: Run Checker
        run: python main.py
        timeout-minutes: 340
        env:
          PYTHONUNBUFFERED: 1

      - name: Remove null bytes from checked files
        run: |
          find checked/ -name "*.txt" -exec sed -i 's/\x00//g' {} \;
          find checked/ -name "*.json" -exec sed -i 's/\x00//g' {} \; || true

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions Bot"
          git config.user.email "actions@github.com"
          git add checked/subscriptions_list.txt || true
          git add checked/**/*.txt || true
          git add checked/**/*.json || true
          git commit -m "🤖 Auto-update checked keys [${{ github.run_id }}]" || echo "No changes to commit"
          git push --force-with-lease origin main
